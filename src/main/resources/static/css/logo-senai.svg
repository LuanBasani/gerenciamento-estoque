<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 44">
  <!-- Fundo vermelho -->
  <rect width="140" height="44" fill="#E30613"/>

  <!-- Linhas esquerdas (3 traços) -->
  <rect x="4" y="10" width="12" height="3" fill="white"/>
  <rect x="4" y="20" width="12" height="3" fill="white"/>
  <rect x="4" y="30" width="12" height="3" fill="white"/>

  <!-- Linhas direitas (3 traços) -->
  <rect x="124" y="10" width="12" height="3" fill="white"/>
  <rect x="124" y="20" width="12" height="3" fill="white"/>
  <rect x="124" y="30" width="12" height="3" fill="white"/>

  <!-- Texto SENAI em itálico bold -->
  <text x="70" y="32"
        font-family="Montserrat, Arial Black, sans-serif"
        font-weight="900"
        font-size="26"
        font-style="italic"
        fill="white"
        text-anchor="middle"
        letter-spacing="3">SENAI</text>
</svg>